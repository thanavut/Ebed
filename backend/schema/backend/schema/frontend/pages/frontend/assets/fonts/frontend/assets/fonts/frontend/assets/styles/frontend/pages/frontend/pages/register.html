<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ebed Registration</title>
  <link href="../assets/fonts/kanit.css" rel="stylesheet" />
  <link href="../assets/fonts/logo-font.css" rel="stylesheet" />
  <link href="../assets/styles/register.css" rel="stylesheet" />
</head>
<body>
  <div class="register-container">
    <img src="../assets/images/logo.svg" alt="Ebed Logo" class="logo" />
    <h1 class="logo-text">Ebed</h1>

    <input type="text" placeholder="Username" class="input-field" />
    <input type="password" placeholder="Password" class="input-field" />
    <input type="text" placeholder="Full name" class="input-field" />

    <button class="btn-primary">Register</button>
    <div class="link-row">
      <a href="login.html">Already have an account?</a>
    </div>
  </div>
</body>
</html>
