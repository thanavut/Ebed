<!-- frontend/pages/profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Profile</title>
  <link href="../assets/fonts/kanit.css" rel="stylesheet" />
  <link href="../assets/fonts/logo-font.css" rel="stylesheet" />
  <link href="../assets/styles/profile.css" rel="stylesheet" />
</head>
<body>
  <div class="profile-container">
    <img src="../assets/images/logo.svg" alt="Ebed Logo" class="logo" />
    <h1 class="logo-text">Ebed</h1>

    <h2 class="section-title">Profile Information</h2>

    <label for="username">Username</label>
    <input type="text" id="username" class="input-field" disabled />

    <label for="fullname">Full Name</label>
    <input type="text" id="fullname" class="input-field" />

    <label for="email">Email</label>
    <input type="text" id="email" class="input-field" />

    <button class="btn-primary">Update Profile</button>
    <div class="link-row">
      <a href="dashboard.html">Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
