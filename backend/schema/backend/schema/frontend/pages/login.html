<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ebed Login</title>
  <link href="../assets/fonts/kanit.css" rel="stylesheet" />
  <link href="../assets/fonts/logo-font.css" rel="stylesheet" />
  <link href="../assets/styles/login.css" rel="stylesheet" />
</head>
<body>
  <div class="login-container">
    <img src="../assets/images/logo.svg" alt="Ebed Logo" class="logo" />
    <h1 class="logo-text">Ebed</h1>

    <input type="text" placeholder="Username" class="input-field" />
    <input type="password" placeholder="Password" class="input-field" />

    <button class="btn-primary">Sign in</button>
    <div class="link-row">
      <a href="register.html">Register</a>
      <a href="reset-password.html">Forgot password?</a>
    </div>
  </div>
</body>
</html>
